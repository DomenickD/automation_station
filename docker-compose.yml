services:
  postgres:
    image: postgres:16-alpine
    container_name: automation-station-postgres
    environment:
      POSTGRES_DB: automation_station
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d automation_station"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: automation-station-web
    env_file:
      - ./web/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  web_node_modules:
